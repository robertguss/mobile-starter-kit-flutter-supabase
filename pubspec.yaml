name: flutter_supabase_starter
description: Production-ready Flutter and Supabase starter kit.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  go_router: ^17.1.0
  intl: ^0.20.2
  onesignal_flutter: ^5.4.3
  posthog_flutter: ^5.19.0
  powersync: ^1.18.0
  purchases_flutter: ^9.13.1
  riverpod_annotation: ^4.0.2
  sentry_flutter: ^9.14.0
  slang: ^4.13.0
  slang_flutter: ^4.13.0
  supabase_flutter: ^2.12.0

dev_dependencies:
  build_runner: ^2.12.2
  flutter_gen_runner: ^5.13.0+1
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.4
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_gen:
  output: lib/gen/
  integrations:
    image: true
