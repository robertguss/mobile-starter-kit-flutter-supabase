name: Build Android

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production-android

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: make codegen

      - name: Create production config
        run: |
          mkdir -p config
          printf '%s' '${{ secrets.CONFIG_PROD_JSON }}' > config/config_prod.json
          chmod 600 config/config_prod.json

      - name: Decode Android keystore
        run: |
          printf '%s' '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 --decode > android/app/keystore.jks
          {
            echo "storeFile=keystore.jks"
            echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } > android/key.properties

      - name: Build app bundle
        run: |
          flutter build appbundle \
            --release \
            --dart-define-from-file=config/config_prod.json \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --build-number=${{ github.run_number }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/debug-info
          retention-days: 30

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: fastlane

      - name: Deploy to Google Play
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          SUPPLY_PACKAGE_NAME: com.example.flutter_supabase_starter
        run: |
          cd fastlane
          bundle exec fastlane deploy_android

      - name: Cleanup build secrets
        if: always()
        run: |
          rm -f android/app/keystore.jks
          rm -f android/key.properties
          rm -f config/config_prod.json
